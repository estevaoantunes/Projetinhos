<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧮</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
</head>

<body class="h-screen flex justify-center items-center bg-indigo-200">
    <div class="h-113 w-80 bg-gray-900 p-6 rounded-2xl">
        <div class="h-15 flex items-center justify-center bg-white text-yellow-500 text-center rounded-lg mb-4">
            <p class="text-2xl text-orange-500 font-bold"></p>
        </div>
        <div class="grid grid-cols-4 gap-3">
            <!--Primeira Fileira-->
            <button class="bg-gray-700 text-white p-4 rounded-lg">C</button>
            <button class="bg-gray-700 text-white p-4 rounded-lg">CE</button>
            <button class="bg-gray-700 text-white p-4 rounded-lg">/</button>
            <button class="bg-orange-500 text-white p-4 rounded-lg">*</button>

            <!--Segunda Fileira-->
            <button class="bg-neutral-800 text-white p-4 rounded-lg">7</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">8</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">9</button>
            <button class="bg-orange-500 text-white p-4 rounded-lg">-</button>
            
            <!--Terceira Fileira-->
            <button class="bg-neutral-800 text-white p-4 rounded-lg">4</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">5</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">6</button>
            <button class="bg-orange-500 text-white p-4 rounded-lg">+</button>

            <!--Quarta Fileira-->

             <button class="bg-neutral-800 text-white p-4 rounded-lg">1</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">2</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">3</button>
            <button class="bg-orange-500 text-white p-4 rounded-lg grid-row-3 row-span-2">=</button>

            <!--Quinta Fileira-->
            <button class="bg-neutral-800 text-white p-4 rounded- col-span-2">0</button>
            <button class="bg-neutral-800 text-white p-4 rounded-lg">.</button>
        </div>
</body>

</html>
